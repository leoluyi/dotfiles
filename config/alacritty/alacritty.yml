window:
  dimensions:
    columns: 120
    lines: 30
  padding:
    x: 8
    'y': 5
  dynamic_padding: true
  decorations: buttonless
scrolling:
  history: 1000
  multiplier: 3
font:
  normal:
    family: Hack Nerd Font
    style: Regular
  bold:
    family: Hack Nerd Font
    style: Bold
  italic:
    family: Hack Nerd Font
    style: Italic
  bold_italic:
    family: Hack Nerd Font
    style: Bold Italic
  size: 15
  offset:
    x: 0
    'y': 8
  use_thin_strokes: true
background_opacity: 0.85
window.dynamic_title: true
cursor:
  style: Block
  unfocused_hollow: true
key_bindings:
  - key: 'N'
    mods: Command
    action: SpawnNewInstance
  - key: Return
    mods: Command
    action: ToggleFullscreen
  - key: Down
    mods: Alt
    chars: "\e[1;5B"
  - key: Up
    mods: Alt
    chars: "\e[1;5A"
  - key: Key0
    mods: Alt
    chars: "\e0"
  - key: Key1
    mods: Alt
    chars: "\e1"
